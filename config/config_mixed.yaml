simulation:
  time_step_s: 0.1                      # integration step (s)
  duration_s:  3600.0                   # total simulated time (s)

  trains:
    # Physics train — rolling-stock parameters sourced from RailML.
    - id: "simulated_express"
      kind: railml
      railml_file: output.xml
      formation_id: formation_class66_mk3
      environment:
        gradient: 0.01                      # rise/run (1 % uphill)
        wind_speed: 0.0                     # m/s (head-wind positive)
      driver:
        power_ratio: 0.8                    # 0–1 throttle
        brake_ratio: 0.0                    # 0–1 braking

    # Timing trains — positions interpolated from real berth timing data.
    # Timestamps are normalised to t=0 at the first record.
    # speed_kmh and acceleration_mss are null in the output for these trains.
    - id: "1A23"
      kind: timing
      parquet_file: berth_timing.parquet

    - id: "2B45"
      kind: timing
      parquet_file: berth_timing.parquet
